<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form ICT</title>
  <style>
    body {
      font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
      background-color: #f0f8ff;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background-color: #ffffff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(70,130,180,0.1);
      width: 300px;
    }
    h1 {
      text-align: center;
      color: #000080;
    }
    form {
      display: flex;
      flex-direction: column;
    }
    label {
      margin-bottom: 5px;
      color: #4682b4;
    }
    input {
      margin-bottom: 15px;
      padding: 10px;
      background-color: #f0f8ff;
      color: #333;
      border: 1px solid #add8e6;
      border-radius: 4px;
    }
    button {
      padding: 10px;
      background-color: #87ceeb;
      color: #000080;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #4682b4;
    }
  </style>

</head>
<body>
  <div class="container">
    <h1>Login !</h1>
    <form id="loginForm" onsubmit="checkLogin(); return false;">
      <label for="username">Username:</label>
      <input type="text" id="username" placeholder="Enter your username" required>
      <label for="password">Password:</label>
      <input type="password" id="password" placeholder="Enter your password" required>
      <button type="submit">Login</button>
    </form>
  </div>

  <script>
    var C_Username = "casey";
    var C_Password = "iloveunicorns1234";

    var attempts = 0;
    var maxAttempts = 3;

    function checkLogin() {
      var username = document.getElementById('username').value;
      var password = document.getElementById('password').value;

      if (username === C_Username && password === C_Password){

        alert("Welcome to your account, " + C_Username + "!");
      } else {
        attempts++;
        alert("Login failed. Attempts left: " + (maxAttempts - attempts));
      } 

      if (attempts === maxAttempts){
        alert("Your account has been locked. Too many failed attempts!!!!!!!");
        document.getElementById('loginForm').style.display = 'none';
      }
    }
  </script>
</body>
</html>
